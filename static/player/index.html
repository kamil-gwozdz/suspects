<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suspects — Join</title>
    <link rel="stylesheet" href="/shared/common.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Join Screen -->
        <div id="join-screen" class="screen active">
            <h1 class="logo-small">SUSPECTS</h1>
            <div class="join-form">
                <input type="text" id="room-code-input" placeholder="Room code" maxlength="4" autocomplete="off" data-i18n-placeholder="placeholder_room_code" style="text-transform:uppercase; text-align:center; letter-spacing:0.3em; font-size:1.5rem;">
                <input type="text" id="player-name" placeholder="Your name" maxlength="20" autocomplete="off" data-i18n-placeholder="placeholder_name">
                <select id="language-select" class="lang-select">
                    <option value="en">🇬🇧 English</option>
                    <option value="pl">🇵🇱 Polski</option>
                    <option value="de">🇩🇪 Deutsch</option>
                    <option value="cs">🇨🇿 Čeština</option>
                    <option value="kk">🇰🇿 Қазақша</option>
                </select>
                <button id="join-btn" class="btn-primary" data-i18n="join">Join Game</button>
            </div>
            <p id="join-error" class="error-text hidden"></p>
        </div>

        <!-- Waiting Screen -->
        <div id="waiting-screen" class="screen">
            <p id="waiting-name" class="player-name-display"></p>
            <p class="waiting-subtitle" data-i18n="waiting_for_players">Waiting for other players...</p>
            <button id="ready-btn" class="ready-btn" data-i18n="not_ready">Not Ready</button>
            <p class="tap-hint" data-i18n="tap_when_ready">Tap when you're ready</p>
            <div id="countdown-display" class="countdown-display hidden"></div>
        </div>

        <!-- Role Reveal Screen -->
        <div id="role-screen" class="screen">
            <div class="role-card" id="role-card">
                <div class="role-card-inner">
                    <h3 data-i18n="your_role">Your Role</h3>
                    <div class="role-icon" id="role-icon"></div>
                    <h2 id="role-name"></h2>
                    <p id="role-description" class="role-desc"></p>
                    <div class="role-faction" id="role-faction"></div>
                </div>
            </div>
        </div>

        <!-- Night Action Screen -->
        <div id="night-screen" class="screen">
            <h2 id="night-instruction" data-i18n="night_action">Choose your target</h2>
            <div id="target-list" class="target-list"></div>
            <button id="confirm-action-btn" class="btn-primary" disabled data-i18n="confirm">Confirm</button>
            <button id="skip-action-btn" class="btn-secondary" data-i18n="skip">Skip</button>
        </div>

        <!-- Sleeping Screen (night) -->
        <div id="sleeping-screen" class="screen">
            <div class="sleeping-moon">🌙</div>
            <div class="zzz-container">
                <span class="zzz">💤</span>
                <span class="zzz">💤</span>
                <span class="zzz">💤</span>
            </div>
            <p class="sleeping-text" data-i18n="close_eyes">Close your eyes...</p>
        </div>

        <!-- Day Screen (waiting) -->
        <div id="day-screen" class="screen">
            <h2 data-i18n="discuss">Discuss!</h2>
            <p data-i18n="discuss_desc">Talk with other players. Who is suspicious?</p>
            <div id="day-timer" class="big-timer"></div>
            <button id="ready-to-vote-btn" class="ready-btn" data-i18n="ready_to_vote">Ready to Vote</button>
        </div>

        <!-- Voting Screen -->
        <div id="vote-screen" class="screen">
            <h2 data-i18n="vote">Vote to eliminate</h2>
            <div id="vote-target-list" class="vote-target-list"></div>
            <div class="vote-actions">
                <button id="cast-vote-btn" class="btn-primary" disabled data-i18n="vote_btn">Cast Vote</button>
            </div>
            <div id="vote-status" class="vote-status"></div>
        </div>

        <!-- Dead Screen -->
        <div id="dead-screen" class="screen">
            <h2 data-i18n="eliminated">You have been eliminated</h2>
            <p data-i18n="watch">Watch the rest of the game in silence.</p>
            <div class="skull-icon">💀</div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-player-screen" class="screen">
            <h2 id="gameover-player-message"></h2>
            <p id="gameover-player-result"></p>
        </div>

        <!-- Reconnecting Overlay -->
        <div id="reconnect-overlay" class="hidden">
            <div class="reconnect-content">
                <div class="reconnect-spinner"></div>
                <p data-i18n="reconnecting">Reconnecting...</p>
            </div>
        </div>
    </div>

    <script src="/shared/ws.js"></script>
    <script src="app.js"></script>
</body>
</html>
