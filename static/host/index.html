<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suspects — Host</title>
    <link rel="stylesheet" href="/shared/common.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Lobby Screen -->
        <div id="lobby-screen" class="screen active">
            <div class="lobby-header">
                <div class="logo">
                    <h1>SUSPECTS</h1>
                    <p class="subtitle" data-i18n="tagline">"Who among you is the traitor?"</p>
                </div>
            </div>
            <div class="lobby-controls lobby-pre-room">
                <select id="language-select" class="language-select-subtle">
                    <option value="en">English</option>
                    <option value="pl">Polski</option>
                    <option value="de">Deutsch</option>
                    <option value="cs">Čeština</option>
                    <option value="kk">Қазақша</option>
                </select>
                <button id="create-room-btn" class="btn-primary" data-i18n="create_room">Create Room</button>
            </div>
            <div id="room-info" class="hidden">
                <div class="lobby-main">
                    <div class="qr-panel">
                        <div id="qr-code"></div>
                        <p class="room-code">ROOM: <span id="room-code-display"></span></p>
                        <p class="join-url" id="join-url"></p>
                    </div>
                    <div class="table-area">
                        <div class="round-table" id="round-table">
                            <div class="table-center-label">
                                <span class="table-icon">🪑</span>
                                <span class="table-text" data-i18n="take_a_seat">Take a seat</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lobby-footer">
                    <div class="volume-control">
                        <label for="volume-slider">🔊</label>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8">
                    </div>
                    <div class="player-count-display">
                        <span id="player-count">0</span> / 30 <span data-i18n="players">players</span>
                    </div>
                </div>
            </div>
            <!-- Auto-start countdown overlay -->
            <div id="auto-start-overlay" class="auto-start-overlay hidden">
                <div class="auto-start-content">
                    <p class="auto-start-label">Game starts in</p>
                    <div class="auto-start-number" id="auto-start-number">5</div>
                </div>
            </div>
        </div>

        <!-- Narration overlay (GM voice + text) -->
        <div id="narration-overlay" class="narration-overlay hidden">
            <p id="narration-text" class="narration-text"></p>
            <div id="narration-indicator" class="narration-indicator hidden"></div>
            <button id="narration-next-btn" class="btn-primary narration-next-btn hidden">Next ▶</button>
        </div>

        <!-- Subtitle bar (non-blocking narration at bottom) -->
        <div id="narration-subtitle" class="narration-subtitle hidden">
            <p id="narration-subtitle-text"></p>
        </div>

        <!-- GM audio player -->
        <audio id="gm-audio" preload="auto"></audio>

        <!-- Phase transition overlay -->
        <div id="phase-overlay" class="phase-overlay"></div>
        <!-- Stars layer (visible during night/dawn) -->
        <div id="stars-layer" class="stars-layer"></div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <span class="round-display" data-i18n="round">Round</span> <span id="round-number">1</span>
                <span class="phase-display" id="phase-display">Night</span>
                <span class="timer" id="timer-display"></span>
            </div>
            <div class="game-content">
                <div id="night-view" class="phase-view">
                    <div class="moon-icon">🌙</div>
                    <h2 data-i18n="night_falls">Night falls on the town...</h2>
                    <p class="narration" data-i18n="night_description">The suspects are making their moves.</p>
                </div>
                <div id="dawn-view" class="phase-view hidden">
                    <div class="sun-icon">🌅</div>
                    <h2 id="dawn-message" data-i18n="dawn_breaks">Dawn breaks...</h2>
                    <div id="death-announcements"></div>
                </div>
                <div id="day-view" class="phase-view hidden">
                    <div class="sun-icon">☀️</div>
                    <h2 data-i18n="day_discussion">Time to discuss</h2>
                    <p class="narration" data-i18n="day_description">Talk it out. Who do you suspect?</p>
                </div>
                <div id="voting-view" class="phase-view hidden">
                    <div class="voting-header">
                        <div class="voting-icon">⚖️</div>
                        <h2 data-i18n="voting_time">Voting Time</h2>
                        <p class="voting-subtitle">Cast your votes now</p>
                    </div>
                    <div id="vote-bars"></div>
                    <div id="votes-cast-counter" class="votes-cast-counter"></div>
                </div>
                <div id="execution-view" class="phase-view hidden">
                    <div id="execution-reveal" class="execution-reveal">
                        <div id="reveal-countdown" class="reveal-countdown hidden"></div>
                        <div id="reveal-spotlight" class="reveal-spotlight hidden">
                            <div id="reveal-label" class="reveal-label"></div>
                            <div id="reveal-name" class="reveal-name"></div>
                            <div id="reveal-subtitle" class="reveal-subtitle"></div>
                        </div>
                    </div>
                </div>
                <div id="gameover-view" class="phase-view hidden">
                    <h2 id="gameover-message"></h2>
                    <div id="role-reveals"></div>
                </div>
            </div>
            <div class="alive-players">
                <h3 data-i18n="alive">Alive</h3>
                <ul id="alive-list"></ul>
            </div>
        </div>
    </div>

    <script src="/shared/qrcode.min.js"></script>
    <script src="/shared/ws.js"></script>
    <script src="audio.js"></script>
    <script src="app.js"></script>
</body>
</html>
